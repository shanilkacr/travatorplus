# Travator API — Cloudflare Workers
# Deploy from repo root: pnpm --filter @travator/api deploy
# Or from apps/api: pnpm deploy

name = "travator-api"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# Monorepo: install deps from workspace root when deploying via CI.
# Local deploy: run `pnpm install` at repo root first.

[vars]
NODE_ENV = "production"
LLM_PROVIDER = "anthropic"
LLM_MODEL = "claude-sonnet-5"
TASK_LLM_PROVIDER = "anthropic"
TASK_LLM_MODEL = "claude-haiku-4-5-20251001"
EMBEDDINGS_PROVIDER = "mock"
EMBEDDINGS_DIM = "1024"
JWT_ISSUER = "travator"
OTP_TTL_SECONDS = "600"
USD_TO_LKR = "305"
# Set WEB_ORIGIN to your Vercel frontend URL, e.g. https://travator.com
WEB_ORIGIN = "http://localhost:3000"

# Secrets (set via `wrangler secret put <NAME>` — do NOT commit):
#   DATABASE_URL       — Supabase pooler URL (port 6543, ?pgbouncer=true)
#   ANTHROPIC_API_KEY  — or OPENAI_API_KEY / GOOGLE_API_KEY
#   JWT_SECRET         — 32+ random chars
#
# Optional Hyperdrive (recommended for production Postgres pooling):
#   1. Create Hyperdrive config pointing at your Supabase direct connection
#   2. Uncomment and set the id below
# [[hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<your-hyperdrive-config-id>"

[observability]
enabled = true
