services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: travator-postgres
    environment:
      POSTGRES_USER: travator
      POSTGRES_PASSWORD: travator
      POSTGRES_DB: travator
    ports:
      - "5432:5432"
    volumes:
      - travator-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travator -d travator"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: travator-redis
    ports:
      - "6379:6379"
    volumes:
      - travator-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  travator-pgdata:
  travator-redisdata:
